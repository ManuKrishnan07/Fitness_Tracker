name: Build APEX Fitness App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    # ← removed defaults/working-directory entirely

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-fitness-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk   # ← removed MyFitnessApp/ prefix
          retention-days: 30

  build-ios:
    name: 🍎 Build iOS (Simulator)
    runs-on: macos-latest
    # ← removed defaults/working-directory entirely

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Pod dependencies
        run: |
          cd ios/App
          pod install

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true
